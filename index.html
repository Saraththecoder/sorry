<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0B0A10">
    <title>I'm Sorry ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="preload" as="image" href="1000334499.png">
    <link rel="preload" as="image" href="1000334498.png">
    <style>
        :root {
            --bg-base: #0B0A10;
            --rose-glow: rgba(232, 99, 122, 0.15);
            --wine-glow: rgba(122, 45, 62, 0.2);
            --text-primary: #FDF6F0;
            --text-secondary: #BCAAA4;
            --accent-red: #E8637A;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glows */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--wine-glow) 0%, transparent 70%);
            top: -20%;
            left: -10%;
        }

        body::after {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--rose-glow) 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation-delay: -4s;
        }

        @keyframes pulseGlow {
            0% {
                transform: scale(0.9);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        /* Card Container */
        .card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-radius: 28px;
            padding: 32px 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hearts */
        .hearts {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .heart {
            font-size: 1.25rem;
            opacity: 0.8;
            filter: drop-shadow(0 0 8px rgba(232, 99, 122, 0.4));
            animation: heartbeat 2s ease-in-out infinite;
        }

        .heart:nth-child(2) {
            animation-delay: 0.3s;
            font-size: 1.5rem;
        }

        .heart:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.2);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.1);
            }

            60% {
                transform: scale(1);
            }
        }

        /* Photo Stage */
        .photo-stage {
            width: 100%;
            max-width: 200px;
            aspect-ratio: 9/16;
            margin: 0 auto 24px;
            position: relative;
            touch-action: none;
            /* Prevent scrolling while swiping */
            perspective: 1000px;
        }

        .photo-card {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            will-change: transform;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .photo-back {
            z-index: 1;
            transform: scale(1) translateY(0) rotate(0deg);
            opacity: 0;
            filter: brightness(1);
        }

        .photo-front {
            z-index: 2;
            cursor: grab;
        }

        .photo-front:active {
            cursor: grabbing;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
        }

        /* Swipe Hint */
        .swipe-hint {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.7;
        }

        .swipe-hint span {
            animation: slideRight 1.5s infinite;
        }

        @keyframes slideRight {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(8px);
            }
        }

        /* Typography */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        h1 em {
            color: var(--accent-red);
            font-style: italic;
        }

        .sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Timer Overlay */
        .timer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 10, 16, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .timer-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .timer-circle {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-circle .track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 4;
        }

        .timer-circle .progress {
            fill: none;
            stroke: var(--accent-red);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 339.29;
            /* 2 * PI * 54 */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 8px rgba(232, 99, 122, 0.5));
        }

        .timer-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--text-primary);
        }

        .timer-label {
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Sorry Modal */
        .modal-container {
            position: fixed;
            inset: 0;
            background: rgba(11, 10, 16, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            padding: 24px;
        }

        .modal-container.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--glass-bg);
            border: 1px solid var(--glass-highlight);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            transform: scale(0.9) translateY(20px);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .modal-container.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .modal p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .modal-btn {
            background: var(--text-primary);
            color: var(--bg-base);
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }

            .photo-stage {
                max-width: 220px;
            }

            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="card" id="mainCard">
        <div class="hearts">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>

        <div class="photo-stage" id="stage">
            <div class="photo-card photo-back" id="photoBack">
                <img src="1000334498.png" alt="Photo 2">
            </div>
            <div class="photo-card photo-front" id="photoFront">
                <img src="1000334499.png" alt="Photo 1">
            </div>
        </div>

        <p class="swipe-hint" id="swipeHint"><span>👉</span> Swipe to reveal</p>

        <h1>I'm <em>so</em> sorry.</h1>
        <p class="sub">You mean everything to me.</p>
    </div>

    <!-- Countdown Timer -->
    <div class="timer-overlay" id="timerOverlay">
        <div class="timer-circle">
            <svg viewBox="0 0 120 120">
                <circle class="track" cx="60" cy="60" r="54"></circle>
                <circle class="progress" id="timerProgress" cx="60" cy="60" r="54"></circle>
            </svg>
            <div class="timer-number" id="timerNumber">5</div>
        </div>
        <p class="timer-label">Something special is coming...</p>
    </div>

    <!-- Sorry Modal -->
    <div class="modal-container" id="sorryModal">
        <div class="modal">
            <h2>Oye selfie 💌</h2>
            <p>
                Inkosari ila repeat avvadu, promise.<br>
                You're the most important person in my life, and I never want to see you sad. I promise to be
                better.<br><br>
                Nannu kshamisthava cheppu? 🥺
            </p>
            <button class="modal-btn" id="modalClose">I missss u so much ❤️</button>
        </div>
    </div>

    <script>
        const front = document.getElementById('photoFront');
        const back = document.getElementById('photoBack');
        const stage = document.getElementById('stage');
        const swipeHint = document.getElementById('swipeHint');
        const mainCard = document.getElementById('mainCard');

        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        let isRevealed = false;

        // Pointer Events for mobile and desktop support
        front.addEventListener('pointerdown', (e) => {
            if (isRevealed) return;
            isDragging = true;
            startX = e.clientX;
            front.style.transition = 'none'; // Disable transition during drag
            front.setPointerCapture(e.pointerId);
        });

        front.addEventListener('pointermove', (e) => {
            if (!isDragging || isRevealed) return;

            currentX = e.clientX - startX;
            const rotate = currentX * 0.1; // Slight rotation
            const opacity = 1 - Math.abs(currentX) / 300; // Fade out slightly

            front.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;
            front.style.opacity = Math.max(opacity, 0.4);

            // Bring back photo forward based on drag distance
            const progress = Math.min(Math.abs(currentX) / 200, 1);
            back.style.opacity = progress;
        });

        front.addEventListener('pointerup', (e) => {
            if (!isDragging || isRevealed) return;
            isDragging = false;
            front.releasePointerCapture(e.pointerId);

            front.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease';
            back.style.transition = 'all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';

            if (Math.abs(currentX) > 100) {
                // Swiped away successfully
                isRevealed = true;
                const direction = currentX > 0 ? 1 : -1;
                front.style.transform = `translateX(${direction * 400}px) rotate(${direction * 20}deg)`;
                front.style.opacity = 0;

                // Bring back photo fully into view
                back.style.transform = 'scale(1) translateY(0) rotate(0deg)';
                back.style.opacity = 1;
                back.style.filter = 'brightness(1)';

                swipeHint.style.opacity = 0;

                // Start countdown after a 2.5s delay
                setTimeout(startCountdown, 2500);
            } else {
                // Reset if not swiped far enough
                front.style.transform = 'translateX(0) rotate(0deg)';
                front.style.opacity = 1;
                back.style.transform = 'scale(1) translateY(0) rotate(0deg)';
                back.style.opacity = 0;
                back.style.filter = 'brightness(1)';
            }
            currentX = 0;
        });

        front.addEventListener('pointercancel', (e) => {
            isDragging = false;
            front.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease';
            front.style.transform = 'translateX(0) rotate(0deg)';
            front.style.opacity = 1;
        });

        function startCountdown() {
            const overlay = document.getElementById('timerOverlay');
            const numEl = document.getElementById('timerNumber');
            const progress = document.getElementById('timerProgress');
            const circumference = 2 * Math.PI * 54; // r=54

            overlay.classList.add('active');
            mainCard.style.filter = 'blur(4px)'; // Blur background card

            let count = 5;
            numEl.textContent = count;
            progress.style.strokeDasharray = circumference;
            progress.style.strokeDashoffset = 0;

            const interval = setInterval(() => {
                count--;
                numEl.textContent = count;

                const offset = circumference * (1 - count / 5);
                progress.style.strokeDashoffset = offset;

                if (count <= 0) {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        showSorryModal();
                    }, 400);
                }
            }, 1000);
        }

        function showSorryModal() {
            const modal = document.getElementById('sorryModal');
            modal.classList.add('active');
        }

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('sorryModal').classList.remove('active');
            mainCard.style.filter = 'none'; // Remove background blur
        });
    </script>
</body>

</html>
